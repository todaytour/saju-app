<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사주 종합 분석 (풀버전)</title>

<style>
body{font-family:Arial;background:#f5f7fb;padding:20px;}
.container{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:15px;}
input,select{width:100%;padding:10px;margin:5px 0 15px;}
button{width:100%;padding:14px;background:#2f6fed;color:#fff;border:none;font-size:16px;}
.choice-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.choice-card{border:1px solid #ddd;padding:12px;border-radius:12px;text-align:center;cursor:pointer;}
.choice-card.active{border:2px solid #2f6fed;background:#eef4ff;}
</style>
</head>

<body>
<div class="container">

<h2>사주 종합 분석 (풀버전)</h2>

<label>출생년도</label>
<input id="year" type="number">

<label>출생월</label>
<input id="month" type="number">

<label>출생일</label>
<input id="day" type="number">

<label>출생시간</label>
<select id="hour">
<option value="0">자</option><option value="2">축</option>
<option value="4">인</option><option value="6">묘</option>
<option value="8">진</option><option value="10">사</option>
<option value="12">오</option><option value="14">미</option>
<option value="16">신</option><option value="18">유</option>
<option value="20">술</option><option value="22">해</option>
</select>

<label>혈액형</label>
<select id="blood">
<option value="unknown">모름</option>
<option value="A">A</option><option value="B">B</option>
<option value="O">O</option><option value="AB">AB</option>
</select>

<label>MBTI</label>
<input id="mbti" placeholder="예: ESTJ">

<label>직업/하는일</label>
<input id="job" placeholder="예: 현장관리">

<hr>

<h3>관상 선택</h3>
<div class="choice-grid">
<div class="choice-card active" onclick="selectVisual('face','good',this)">균형형</div>
<div class="choice-card" onclick="selectVisual('face','sharp',this)">날카형</div>
<div class="choice-card" onclick="selectVisual('face','soft',this)">부드형</div>
</div>
<select id="face" style="display:none;">
<option value="good" selected></option>
<option value="sharp"></option>
<option value="soft"></option>
</select>

<hr>

<h3>손금 선택</h3>
<div class="choice-grid">
<div class="choice-card active" onclick="selectVisual('life','deep',this)">생명선 깊음</div>
<div class="choice-card" onclick="selectVisual('life','light',this)">얕음</div>
<div class="choice-card" onclick="selectVisual('life','broken',this)">끊김</div>
</div>
<select id="life" style="display:none;">
<option value="deep" selected></option>
<option value="light"></option>
<option value="broken"></option>
</select>

<button onclick="calc()">결과 보기</button>

<div id="result"></div>

</div>

<script>

function selectVisual(id,value,el){
document.getElementById(id).value=value;
const cards=el.parentElement.querySelectorAll('.choice-card');
cards.forEach(c=>c.classList.remove('active'));
el.classList.add('active');
}

function calc(){
let main="토";
let job=document.getElementById("job").value;
let mbti=document.getElementById("mbti").value;
let blood=document.getElementById("blood").value;

let result=`
<h3>종합 분석</h3>

이 사주는 기본적으로 안정성과 책임감을 중심으로 하는 구조입니다.
특히 현실적인 판단과 결과 중심 사고가 강하게 작용하며,
단순 업무보다 관리·운영·책임 역할에서 강점을 보입니다.

<h4>직업 분석</h4>
현재 직업(${job})은 사주와 비교했을 때 비교적 적합한 흐름입니다.
다만 체계 관리와 문서 정리 능력을 강화하면 더 큰 성과가 가능합니다.

<h4>재물운</h4>
이 사주는 한 번에 크게 벌기보다는 꾸준히 쌓는 구조입니다.
부동산, 장기 투자, 안정형 자산과 궁합이 좋습니다.

<h4>투자 성향</h4>
안정형 투자자 성향입니다.
단타보다는 장기 투자 전략이 유리합니다.

<h4>MBTI + 혈액형 분석</h4>
${mbti} 성향과 ${blood}형 특성이 결합되면서
현실적 판단과 실행력이 강화됩니다.

<h4>관상</h4>
선택 결과: ${document.getElementById("face").value}

<h4>손금</h4>
생명선: ${document.getElementById("life").value}

<h4>최종 조언</h4>
꾸준함이 가장 큰 무기입니다.
급하게 성과를 내기보다 기반을 쌓을수록 운이 강해집니다.
`;

document.getElementById("result").innerHTML=result;
}

</script>

</body>
</html>
